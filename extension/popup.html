<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Reader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="fr-popover" id="popover">
      <header class="fr-header">
        <div class="fr-logo">FR</div>
        <h1 class="fr-title">Focus Reader</h1>
        <span class="fr-status-dot" id="statusDot" title="status"></span>
      </header>

      <!-- Start -->
      <button class="fr-primary" id="startBtn">
        <span class="fr-primary-icon" id="primaryIcon">&#9654;</span>
        <span id="primaryLabel">Start</span>
      </button>

      <!-- Bold intensity (segmented toggle) -->
      <div class="fr-row">
        <span class="fr-row-name">Bold intensity</span>
        <div class="fr-seg" id="boldnessSeg" role="group" aria-label="Bold intensity">
          <span class="fr-seg-indicator" id="boldnessIndicator"></span>
          <button class="fr-seg-btn" data-level="0">Light</button>
          <button class="fr-seg-btn" data-level="1">Medium</button>
          <button class="fr-seg-btn" data-level="2">Heavy</button>
        </div>
      </div>

      <!-- Gaze reading (enable toggle) -->
      <div class="fr-row">
        <span class="fr-row-name">Gaze reading</span>
        <button
          class="fr-toggle"
          id="gazeToggle"
          role="switch"
          aria-checked="false"
          aria-label="Enable gaze reading"
        >
          <span class="fr-toggle-glow"></span>
          <span class="fr-toggle-thumb">
            <span class="fr-toggle-ripple"></span>
            <span class="fr-toggle-dot"></span>
          </span>
        </button>
      </div>
      <p class="fr-gaze-note" id="gazeNote" hidden></p>
      <button class="fr-link" id="gazeRecalBtn" hidden>Recalibrate</button>

      <!-- Open a document -->
      <label class="fr-dropzone" id="dropzone" for="fileInput">
        <span class="fr-dropzone-icon">&#128462;</span>
        <span class="fr-dropzone-text" id="dropzoneText">Drop a file</span>
        <input
          type="file"
          id="fileInput"
          accept=".pdf,.txt,.md,.markdown,.text,application/pdf,text/plain"
          hidden
        />
      </label>
      <button class="fr-secondary" id="openReaderBtn" disabled>
        Open in Reader
      </button>
    </div>

    <script src="src/bionic.js"></script>
    <script src="src/filestore.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
